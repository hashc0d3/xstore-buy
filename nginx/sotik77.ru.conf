###############################################################################
# Vhost-блок для домена sotik77.ru.
#
# В реальной инсталляции эти серверные блоки лежат в
# /opt/infra-proxy/conf.d/sites.conf (в одном файле со всеми остальными
# доменами). Здесь дублируется именно «свой» блок sotik77.ru, чтобы при
# восстановлении инфраструктуры с нуля не потерять конфигурацию.
#
# Подробности — в docs/SERVER_DEPLOYMENT.md и docs/ADD_NEW_SITE.md.
###############################################################################

server {
    listen 80;
    listen [::]:80;
    server_name sotik77.ru www.sotik77.ru;
    return 301 https://sotik77.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sotik77.ru www.sotik77.ru;

    ssl_certificate     /etc/letsencrypt/live/sotik77.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sotik77.ru/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
