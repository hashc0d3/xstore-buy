###############################################################################
# Шаблон vhost для xstore55.ru (прод: infra-nginx и SSL на сервере).
# Подключите рядом с sotik77.ru; proxy_pass на порт web xstore на хосте (часто 8080).
###############################################################################

server {
    listen 80;
    listen [::]:80;
    server_name xstore55.ru www.xstore55.ru;
    return 301 https://xstore55.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name xstore55.ru www.xstore55.ru;

    ssl_certificate     /etc/letsencrypt/live/xstore55.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xstore55.ru/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
